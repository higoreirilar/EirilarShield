<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Usuários - Eirilar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f6f7fb;
font-family:Arial;
}

.container{
margin-left:260px;
padding:20px;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100%;
background:#fff;
border-right:1px solid #eee;
padding:20px;
}

.sidebar a{
display:block;
padding:10px;
text-decoration:none;
color:#333;
border-radius:8px;
}

.sidebar a:hover{
background:#fce8eb;
color:#c8102e;
}

h2{
color:#c8102e;
}

table{
width:100%;
background:#fff;
border-radius:10px;
overflow:hidden;
border:1px solid #eee;
}

th{
background:#f9fafb;
padding:10px;
text-align:left;
font-size:12px;
}

td{
padding:10px;
border-top:1px solid #eee;
font-size:13px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3 style="color:#c8102e;">EIRILAR</h3>
<a href="/dashboard">Dashboard</a>
<a href="/usuarios">Usuários</a>
<a href="/pedidos">Pedidos</a>
<a href="/logs">Logs</a>
<a href="/logout">Sair</a>
</div>

<!-- CONTENT -->
<div class="container">

<h2>Usuários</h2>

<table>
<tr>
<th>ID</th>
<th>Nome</th>
<th>Email</th>
<th>Role</th>
</tr>

{% for u in usuarios %}
<tr>
<td>{{ u.id }}</td>
<td>{{ u.nome }}</td>
<td>{{ u.email }}</td>
<td>{{ u.role }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
