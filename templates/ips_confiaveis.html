{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 style="color:#b30000;">IPs Confiáveis</h2>
    <p>Gerencie IPs liberados no sistema antifraude</p>

    <!-- FORM ADD -->
    <div class="card p-3 mb-4">
        <form method="POST" action="{{ url_for('ips_confiaveis.add_ip') }}">

            <div class="row">

                <div class="col-md-4">
                    <input class="form-control" name="ip" placeholder="Ex: 192.168.0.1" required>
                </div>

                <div class="col-md-6">
                    <input class="form-control" name="observacao" placeholder="Observação">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-danger w-100">Adicionar</button>
                </div>

            </div>

        </form>
    </div>

    <!-- TABLE -->
    <div class="card p-3">

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>IP</th>
                    <th>Observação</th>
                    <th>Data</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody>

                {% for ip in ips %}

                <tr>
                    <td>{{ ip.id }}</td>
                    <td><strong>{{ ip.ip }}</strong></td>
                    <td>{{ ip.observation }}</td>
                    <td>{{ ip.created_at }}</td>
                    <td>
                        <a href="{{ url_for('ips_confiaveis.delete_ip', id=ip.id) }}"
                           class="btn btn-sm btn-outline-danger">
                            Remover
                        </a>
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
