<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Eirilar Shield</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0b0f14; /* fundo dark dashboard */
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #111827; /* painel escuro estilo dashboard */
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 35px;
            width: 360px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ff3b3b; /* vermelho tema */
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #1f2937;
            color: #fff;
        }

        .form-control:focus {
            border-color: #ff3b3b;
            box-shadow: none;
            background: #0f172a;
            color: #fff;
        }

        .btn-login {
            background: #ff3b3b;
            border: none;
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }

        .btn-login:hover {
            background: #e11d2a;
        }

        .msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="title">
        EIRILAR SHIELD
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">
          {% for msg in messages %}
            {{ msg }}<br>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <input type="password" name="senha" class="form-control" placeholder="Senha" required>
        </div>

        <button type="submit" class="btn btn-login">Entrar</button>

    </form>

    <div class="footer-text">
        Sistema interno • Painel administrativo
    </div>

</div>

</body>
</html>
