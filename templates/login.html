<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Eirilar Shield - Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .box {
            width: 360px;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            color: #d10000;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d10000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #a80000;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>EIRILAR SHIELD</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="senha" placeholder="Senha" required>

        <button type="submit">Entrar</button>
    </form>

    <div class="footer">
        Sistema antifraude
    </div>
</div>

</body>
</html>
