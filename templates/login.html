<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Eirilar Shield</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
}

/* LADO ESQUERDO (igual sidebar do dashboard) */
.left-panel {
    width: 45%;
    background: linear-gradient(180deg, #e0002a, #b80022);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* LOGO */
.logo-box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.logo-box img {
    width: 140px;
}

/* TEXTO */
.left-panel h1 {
    font-size: 26px;
    font-weight: bold;
}

.left-panel p {
    opacity: 0.9;
    font-size: 14px;
}

/* LADO DIREITO */
.right-panel {
    width: 55%;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD LOGIN */
.login-card {
    width: 360px;
    background: white;
    border-radius: 12px;
    padding: 35px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.login-title {
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
    color: #e0002a;
}

/* INPUT */
.form-control {
    border-radius: 8px;
}

/* BOTÃO */
.btn-login {
    background: #e0002a;
    border: none;
    width: 100%;
    padding: 10px;
    font-weight: bold;
    border-radius: 8px;
}

.btn-login:hover {
    background: #b80022;
}

/* MENSAGEM */
.msg {
    color: #e0002a;
    font-size: 14px;
    margin-bottom: 10px;
    text-align: center;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-top: 10px;
}

</style>
</head>

<body>

<!-- ESQUERDA -->
<div class="left-panel">

    <div class="logo-box">
        <img src="/static/logo.png" alt="Logo">
    </div>

    <h1>Eirilar Shield</h1>
    <p>Sistema interno de gestão e segurança</p>

</div>

<!-- DIREITA -->
<div class="right-panel">

    <div class="login-card">

        <div class="login-title">ACESSO AO SISTEMA</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="msg">
              {% for msg in messages %}
                {{ msg }}<br>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">

            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

            <input type="password" name="senha" class="form-control mb-3" placeholder="Senha" required>

            <button type="submit" class="btn btn-login">Entrar</button>

        </form>

        <div class="footer">
            Eirilar © Sistema interno
        </div>

    </div>

</div>

</body>
</html>
