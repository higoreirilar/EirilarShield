<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Sistema Antifraude{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    {% block css %}{% endblock %}

</head>

<body>

<div class="layout">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="logo">

            <img src="https://i.ibb.co/VWzx61J4/logo-vermelho.png" alt="Logo">

        </div>

        <nav>

            <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
                <i class="bi bi-grid-fill"></i>
                <span>Dashboard</span>
            </a>

            <a href="/usuarios" class="{% if request.path == '/usuarios' %}active{% endif %}">
                <i class="bi bi-people-fill"></i>
                <span>Usuários</span>
            </a>

            <a href="/pedidos" class="{% if request.path == '/pedidos' %}active{% endif %}">
                <i class="bi bi-bag-check-fill"></i>
                <span>Pedidos</span>
            </a>

            <a href="/risco" class="{% if request.path == '/risco' %}active{% endif %}">
                <i class="bi bi-shield-fill"></i>
                <span>Análise de Risco</span>
            </a>

            <a href="/alertas" class="{% if request.path == '/alertas' %}active{% endif %}">
                <i class="bi bi-bell-fill"></i>
                <span>Alertas</span>
            </a>

            <a href="/logs" class="{% if request.path == '/logs' %}active{% endif %}">
                <i class="bi bi-file-earmark-text-fill"></i>
                <span>Logs</span>
            </a>

            <a href="/dispositivos" class="{% if request.path == '/dispositivos' %}active{% endif %}">
                <i class="bi bi-phone-fill"></i>
                <span>Dispositivos</span>
            </a>

            <hr>

            <a href="/configuracoes">
                <i class="bi bi-gear-fill"></i>
                <span>Configurações</span>
            </a>

            <a href="/logout">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sair</span>
            </a>

        </nav>

    </aside>

    <!-- ================= CONTEÚDO ================= -->

    <div class="content">

        <!-- Topbar -->

        <header class="topbar">

            <div>

                <h3>{% block page_title %}Dashboard{% endblock %}</h3>

                <small class="text-muted">
                    Sistema Inteligente Antifraude
                </small>

            </div>

            <div class="top-actions">

                <div class="search-box">

                    <i class="bi bi-search"></i>

                    <input
                        type="text"
                        placeholder="Pesquisar..."
                        class="search-input">

                </div>

                <button class="notification">

                    <i class="bi bi-bell-fill"></i>

                    {% if alertas %}
                    <span>{{ alertas|length }}</span>
                    {% endif %}

                </button>

                <div class="profile">

                    <img src="{{ url_for('static', filename='img/user.png') }}">

                    <div>

                        <strong>Administrador</strong>

                        <small>Online</small>

                    </div>

                </div>

            </div>

        </header>

        <!-- Conteúdo -->

        <main>

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
