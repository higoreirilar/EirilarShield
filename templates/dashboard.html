<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Antifraude</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #f8f9fa;
    font-family: Arial;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    background: #fff;
    border-right: 2px solid #eee;
    padding: 20px;
}

.logo {
    width: 140px;
    margin-bottom: 25px;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: 10px;
    color: #333;
    text-decoration: none;
}

.menu a:hover {
    background: #ffe5e5;
    color: #c40000;
}

.menu i {
    color: #c40000;
}

/* MAIN */
.main {
    margin-left: 270px;
    padding: 20px;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.search-box {
    width: 320px;
}

.admin {
    display: flex;
    align-items: center;
    gap: 12px;
}

.badge-admin {
    background: #c40000;
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
}

/* TABLE */
.card {
    border-radius: 12px;
}

.btn-action i {
    pointer-events: none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <img class="logo" src="https://i.ibb.co/1tyzJs4j/logo-vermelho.png">

    <div class="menu">
        <a href="#"><i class="bi bi-person"></i> Usuários</a>
        <a href="#"><i class="bi bi-bag"></i> Pedidos</a>
        <a href="#"><i class="bi bi-journal-text"></i> Logs</a>
        <a href="#"><i class="bi bi-shield-check"></i> Regras</a>
        <a href="#"><i class="bi bi-exclamation-triangle"></i> Risco</a>
        <a href="#"><i class="bi bi-bell"></i> Alertas</a>
        <a href="#"><i class="bi bi-graph-up"></i> Relatórios</a>
        <a href="#"><i class="bi bi-gear"></i> Configurações</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP -->
    <div class="topbar">

        <input id="search" class="form-control search-box" placeholder="Buscar nome, CPF, IP...">

        <div class="admin">
            <i class="bi bi-bell fs-5 position-relative">
                <span class="position-absolute top-0 start-100 translate-middle badge bg-danger">3</span>
            </i>

            <div class="badge-admin">Admin Online</div>

            <i class="bi bi-person-circle fs-3 text-danger"></i>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <strong>Clientes Railway</strong>
        </div>

        <div class="card-body p-0">

            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>IP</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>Cidade</th>
                        <th>Estado</th>
                        <th>Valor</th>
                        <th>Pagamento</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tbody"></tbody>
            </table>

        </div>
    </div>

</div>

<script>
const API_URL = "https://SEU-PROJETO.up.railway.app/clientes";

let clientesGlobais = [];

async function loadClientes() {
    const res = await fetch(API_URL);
    clientesGlobais = await res.json();
    render(clientesGlobais);
}

function render(data) {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(c => {
        tbody.innerHTML += `
        <tr>
            <td>${c.ip}</td>
            <td>${c.nome}</td>
            <td>${c.cpf}</td>
            <td>${c.telefone}</td>
            <td>${c.cidade}</td>
            <td>${c.estado}</td>
            <td>${c.valor}</td>
            <td>${c.pagamento}</td>
            <td>
                <button class="btn btn-sm btn-danger btn-action" onclick="bloquear('${c.cpf}')">
                    <i class="bi bi-lock"></i>
                </button>

                <button class="btn btn-sm btn-success btn-action" onclick="desbloquear('${c.cpf}')">
                    <i class="bi bi-unlock"></i>
                </button>

                <button class="btn btn-sm btn-primary btn-action" onclick="ligar('${c.telefone}')">
                    <i class="bi bi-telephone"></i>
                </button>

                <button class="btn btn-sm btn-dark">
                    <i class="bi bi-person"></i>
                </button>
            </td>
        </tr>`;
    });
}

/* BUSCA */
document.getElementById("search").addEventListener("input", (e) => {
    const v = e.target.value.toLowerCase();

    const filtrado = clientesGlobais.filter(c =>
        c.nome.toLowerCase().includes(v) ||
        c.cpf.toLowerCase().includes(v) ||
        c.ip.toLowerCase().includes(v)
    );

    render(filtrado);
});

/* AÇÕES (front apenas) */
function bloquear(cpf) {
    alert("Cliente bloqueado: " + cpf);
}

function desbloquear(cpf) {
    alert("Cliente desbloqueado: " + cpf);
}

function ligar(tel) {
    window.location.href = "tel:" + tel;
}

loadClientes();
</script>

</body>
</html>
