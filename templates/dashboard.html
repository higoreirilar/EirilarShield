<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Antifraude PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://kit.fontawesome.com/2c36e9b7b1.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6fb;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #fff;
    height: 100vh;
    padding: 20px;
    border-right: 1px solid #eee;
}

.sidebar h2 {
    color: #ff2d2d;
}

.sidebar a {
    display: block;
    padding: 12px;
    margin: 6px 0;
    text-decoration: none;
    color: #333;
    border-radius: 8px;
}

.sidebar a:hover {
    background: #f2f2f2;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* TOP */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.search {
    width: 400px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #fff;
    padding: 15px;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

.card i {
    font-size: 22px;
    color: red;
}

.card h3 {
    margin: 5px 0;
    font-size: 14px;
    color: #666;
}

.card h1 {
    margin: 0;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

.box {
    background: #fff;
    padding: 15px;
    border-radius: 14px;
}

/* ALERTAS */
.alert {
    padding: 10px;
    border-left: 4px solid red;
    margin-bottom: 10px;
    background: #fff;
    font-size: 14px;
}

/* RISCO */
.risco {
    display: flex;
    justify-content: space-between;
}

.badge-red { color: red; }
.badge-orange { color: orange; }
.badge-green { color: green; }

canvas {
    max-width: 100%;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Erlar Space</h2>
    <a href="#">Dashboard</a>
    <a href="#">Usuários</a>
    <a href="#">Pedidos</a>
    <a href="#">Logs</a>
    <a href="#">Risco</a>
    <a href="#">Alertas</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="top">
    <h2>Dashboard Antifraude</h2>
    <input class="search" placeholder="Pesquisar usuários, pedidos, logs...">
</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
<i class="fas fa-users"></i>
<h3>Usuários</h3>
<h1 id="usuarios">0</h1>
</div>

<div class="card">
<i class="fas fa-shopping-cart"></i>
<h3>Pedidos</h3>
<h1 id="pedidos">0</h1>
</div>

<div class="card">
<i class="fas fa-file-alt"></i>
<h3>Logs</h3>
<h1 id="logs">0</h1>
</div>

<div class="card">
<i class="fas fa-shield-alt"></i>
<h3>Score Médio</h3>
<h1 id="score">0</h1>
</div>

</div>

<!-- GRID -->
<div class="grid">

<!-- GRAFICO -->
<div class="box">
<h3>Score Médio (7 dias)</h3>
<canvas id="chart"></canvas>
</div>

<!-- ALERTAS -->
<div class="box">
<h3>Alertas Ativos</h3>
<div id="alertas"></div>
</div>

</div>

<!-- RISCO -->
<div class="grid">

<div class="box">
<h3>Visão Geral de Risco</h3>
<canvas id="donut"></canvas>
</div>

<div class="box">
<h3>Dispositivos</h3>
<canvas id="devices"></canvas>
</div>

</div>

</div>

<script>

/* ================= API ================= */

async function loadStats(){
    let r = await fetch("/api/dashboard/stats");
    let d = await r.json();

    usuarios.innerText = d.usuarios;
    pedidos.innerText = d.pedidos;
    logs.innerText = d.logs;
    score.innerText = d.score_medio;
}

async function loadAlertas(){
    let r = await fetch("/api/alertas");
    let d = await r.json();

    let box = document.getElementById("alertas");
    box.innerHTML = "";

    d.forEach(a=>{
        box.innerHTML += `
        <div class="alert">
        <b>${a.titulo}</b><br>
        ${a.mensagem}
        </div>`;
    });
}

async function loadCharts(){

    let r = await fetch("/api/dashboard/score7dias");
    let d = await r.json();

    new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:d.labels,
            datasets:[{
                data:d.values,
                borderColor:"red",
                fill:true
            }]
        }
    });

    new Chart(document.getElementById("donut"),{
        type:"doughnut",
        data:{
            labels:["Alto","Médio","Baixo"],
            datasets:[{
                data:[32,28,40],
                backgroundColor:["red","orange","green"]
            }]
        }
    });

    new Chart(document.getElementById("devices"),{
        type:"doughnut",
        data:{
            labels:["Mobile","Desktop","Tablet"],
            datasets:[{
                data:[62,28,10],
                backgroundColor:["#ff2d2d","#444","#999"]
            }]
        }
    });

}

/* INIT */
loadStats();
loadAlertas();
loadCharts();

/* AUTO UPDATE */
setInterval(loadStats,5000);
setInterval(loadAlertas,5000);

</script>

</body>
</html>
